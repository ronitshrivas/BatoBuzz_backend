services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: batobuzz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: batobuzz_identity
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    restart: unless-stopped
  identity:
    build:
      context: .
      dockerfile: services/identity/BatoBuzz.Identity/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=batobuzz_identity;Username=batobuzz;Password=${DB_PASSWORD}"
      Jwt__Issuer: "batobuzz.identity"
      Jwt__Audience: "batobuzz.apps"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenMinutes: "30"
      Jwt__RefreshTokenDays: "30"
    ports:
      - "5001:8080"
    depends_on:
      - postgres
    restart: unless-stopped
  feed:
    build:
      context: .
      dockerfile: services/feed/BatoBuzz.Feed/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__FeedDb: "Host=postgres;Port=5432;Database=batobuzz_feed;Username=batobuzz;Password=${DB_PASSWORD}"
      Jwt__Issuer: "batobuzz.identity"
      Jwt__Audience: "batobuzz.apps"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenMinutes: "30"
      Jwt__RefreshTokenDays: "30"
    ports:
      - "5002:8080"
    depends_on:
      - postgres
    restart: unless-stopped
  gateway:
    build:
      context: .
      dockerfile: gateway/BatoBuzz.Gateway/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ReverseProxy__Clusters__identity__Destinations__d1__Address: "http://identity:8080/"
      ReverseProxy__Clusters__feed__Destinations__d1__Address: "http://feed:8080/"
    ports:
      - "8080:8080"
    depends_on:
      - identity
      - feed
    restart: unless-stopped
volumes:
  pgdata: