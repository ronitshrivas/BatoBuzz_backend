services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: batobuzz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: batobuzz_identity
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: BatoBuzz.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=batobuzz_identity;Username=batobuzz;Password=${DB_PASSWORD}"
      ConnectionStrings__FeedDb: "Host=postgres;Port=5432;Database=batobuzz_feed;Username=batobuzz;Password=${DB_PASSWORD}"
      ConnectionStrings__MerchantDb: "Host=postgres;Port=5432;Database=batobuzz_merchant;Username=batobuzz;Password=${DB_PASSWORD}"
      ConnectionStrings__ServiceProviderDb: "Host=postgres;Port=5432;Database=batobuzz_serviceprovider;Username=batobuzz;Password=${DB_PASSWORD}"
      Jwt__Issuer: "batobuzz.identity"
      Jwt__Audience: "batobuzz.apps"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenMinutes: "30"
      Jwt__RefreshTokenDays: "30"
    volumes:
      - api_uploads:/app/wwwroot/uploads
    ports:
      - "5001:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  api_uploads:
