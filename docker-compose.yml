services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: batobuzz
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: batobuzz_identity
    ports: ["5432:5432"]
    volumes:
      - "pgdata:/var/lib/postgresql/data"
      - "./init-db:/docker-entrypoint-initdb.d"

  feed:
    build:
      context: .
      dockerfile: services/feed/BatoBuzz.Feed/Dockerfile
    ports: ["5002:8080"]
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__FeedDb: "Host=postgres;Port=5432;Database=batobuzz_feed;Username=batobuzz;Password=changeme"
      Jwt__Issuer: batobuzz.identity
      Jwt__Audience: batobuzz.apps
      Jwt__SigningKey: "REPLACE_WITH_THE_EXACT_SAME_KEY_YOUR_IDENTITY_USES"
    depends_on:
      - postgres

volumes:
  pgdata:
